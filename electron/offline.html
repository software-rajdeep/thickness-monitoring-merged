<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'; script-src 'sha256-+6WnXIl4mbFTCARd8N3COQmT3bJJmo32N8q8ZSQAIcU='" />
  <title>Thickness Monitor — Offline</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    #root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    /* ── Icon (connection-loss SVG) ──────────────────────────────── */
    .offline-icon {
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }

    .offline-icon .circle {
      fill: none;
      stroke: #475569;
      stroke-width: 4;
    }

    .offline-icon .slash {
      fill: none;
      stroke: #ef4444;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .offline-icon .wave {
      fill: none;
      stroke: #64748b;
      stroke-width: 3;
      stroke-linecap: round;
    }

    /* ── Typography ──────────────────────────────────────────────── */
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #94a3b8;
      max-width: 480px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding: 0.6rem 1.25rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 9999px;
      font-size: 0.9rem;
      color: #fca5a5;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Retry message ───────────────────────────────────────────── */
    .retry-note {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: #64748b;
    }

    .retry-note span {
      display: inline-block;
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: #334155;
    }

    .footer strong {
      color: #475569;
    }

    /* ── Responsive tweaks ───────────────────────────────────────── */
    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      p  { font-size: 1rem; }
      .offline-icon { width: 72px; height: 72px; }
    }

    @media (min-width: 1200px) {
      h1 { font-size: 2.4rem; }
      .offline-icon { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Offline SVG icon -->
    <svg class="offline-icon" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Outer antenna circle -->
      <path class="wave" d="M28 40 C28 32, 36 24, 48 24 C60 24, 68 32, 68 40"
            stroke-width="3" stroke-linecap="round" />
      <path class="wave" d="M18 30 C18 16, 32 8, 48 8 C64 8, 78 16, 78 30"
            stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
      <path class="wave" d="M10 20 C10 4, 26 0, 48 0 C70 0, 86 4, 86 20"
            stroke-width="2" stroke-linecap="round" opacity="0.3" />
      <!-- Circle around icon -->
      <circle class="circle" cx="48" cy="48" r="44" />
      <!-- Disconnected slash -->
      <line class="slash" x1="28" y1="68" x2="68" y2="28" />
      <!-- Small device base -->
      <rect x="40" y="56" width="16" height="24" rx="3" fill="#475569" fill-opacity="0.5" />
      <rect x="44" y="74" width="8" height="2" rx="1" fill="#475569" />
    </svg>

    <h1>No Internet Connection</h1>

    <p>
      The Thickness Monitor requires an active Internet connection to reach
      the cloud dashboard. The application will automatically reconnect once
      your network is restored.
    </p>

    <div class="status">
      <span class="status-dot"></span>
      Offline — retrying automatically
    </div>

    <p class="retry-note">
      Checking every few seconds&hellip;
    </p>

    <div class="footer">
      <strong>Thickness Monitor</strong> &mdash; Rajdeep Analytics
    </div>
  </div>
</body>
</html>
